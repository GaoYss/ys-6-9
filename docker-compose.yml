services:
  backend:
    build:
      context: ./backend
    container_name: hotpot-backend
    ports:
      - "18000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ./frontend
    container_name: hotpot-frontend
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:18000/api
    ports:
      - "15173:5173"
    depends_on:
      backend:
        condition: service_healthy
